<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alkitab PWA</title>
    <!-- Jalur Relatif & Logo Terintegrasi Langsung Sesuai Kebijakan PWA -->
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml;utf8,<svg xmlns='http://w3.org' viewBox='0 0 512 512' width='512' height='512'><rect width='512' height='512' rx='15%' fill='%232563eb'/><g transform='translate(96, 96) scale(0.62)' fill='%23ffffff'><path d='M448 360V24c0-13.3-10.7-24-24-24H96C43 0 0 43 0 96v320c0 53 43 96 96 96h328c13.3 0 24-10.7 24-24v-16c0-7.5-3.5-14.3-8.9-18.7c4.1-5.6 4.9-13.1 1.4-19.3c5.3-5.2 7.5-12.8 5.4-20.1c4.5-5.9 5-14.1 1-20.5c3.9-6.3 3.7-14.5-.6-20.7c3.4-6.6 2.4-14.7-2.6-20.4c2.6-6.4 1.3-13.9-3.4-18.9c2-6.5.4-13.8-4.2-18.5c1.4-6.8-.7-13.9-5.5-18.4c.5-7.2-2.1-14.2-7.4-18.5c-.3-7.4-4-14.1-10.1-18.1zM96 64h288v256H96c-17.7 0-32-14.3-32-32V96c0-17.7 14.3-32 32-32zm288 384H96c-17.7 0-32-14.3-32-32s14.3-32 32-32h288v64z'/></g></svg>">
    <meta name="theme-color" content="#2563eb">
    <!-- Menggunakan CDN Tailwind CSS Resmi -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans">

    <div class="max-w-3xl mx-auto p-4 sm:p-6">
        <header class="text-center my-6">
            <h1 class="text-3xl font-bold text-blue-600">📖 Alkitab Digital</h1>
            <p class="text-gray-500 mt-2">Membaca Firman Tuhan kapan saja</p>
        </header>

        <!-- Formulir Pencarian / Navigasi -->
        <div class="bg-white p-4 rounded-xl shadow-md flex flex-wrap gap-3 items-center justify-between mb-6">
            <div class="flex flex-wrap gap-2 w-full sm:w-auto">
                <!-- Dropdown Kitab -->
                <select id="select-kitab" class="border p-2 rounded-lg bg-gray-50 focus:outline-blue-500"></select>
                <!-- Input Pasal -->
                <input id="input-pasal" type="number" value="1" min="1" class="border p-2 rounded-lg w-20 text-center focus:outline-blue-500">
            </div>
            <button id="btn-cari" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-semibold px-6 py-2 rounded-lg transition">
                Buka Pasal
            </button>
        </div>

        <!-- Indikator Loading -->
        <div id="loading" class="hidden text-center text-xl text-gray-600 my-10 animate-pulse">
            ⏳ Memuat isi Alkitab...
        </div>

        <!-- Judul Pasal yang sedang dibaca -->
        <h2 id="judul-pasal" class="text-2xl font-bold text-gray-700 mb-4 hidden"></h2>

        <!-- Area Konten Ayat -->
        <div id="konten-alkitab" class="space-y-4 bg-white p-6 rounded-xl shadow-md hidden">
            <!-- Isi ayat akan disuntikkan lewat JavaScript -->
        </div>
    </div>

    <script>
        // Endpoint publik API Alkitab yang di-deploy di Vercel (Sabda API wrapper)
        const BASE_URL = 'https://api-alkitab.vercel.app'; 

        const selectKitab = document.getElementById('select-kitab');
        const inputPasal = document.getElementById('input-pasal');
        const btnCari = document.getElementById('btn-cari');
        const loading = document.getElementById('loading');
        const kontenAlkitab = document.getElementById('konten-alkitab');
        const judulPasal = document.getElementById('judul-pasal');

        // REGISTRASI SERVICE WORKER (PWA) - Diatur relatif untuk GitHub Pages
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker aktif di subfolder:', reg.scope))
                    .catch(err => console.error('Service Worker gagal:', err));
            });
        }

        // 1. Fungsi mengambil daftar kitab saat aplikasi pertama kali dibuka
        async function muatDaftarKitab() {
            try {
                const response = await fetch(`${BASE_URL}/books`);
                const data = await response.json();
                
                data.forEach(kitab => {
                    const option = document.createElement('option');
                    // Menyimpan 'id' kitab (misal: 'kejadian') untuk query API
                    option.value = kitab.id; 
                    option.textContent = kitab.name;
                    selectKitab.appendChild(option);
                });
                
                // Secara bawaan langsung tampilkan Kitab Kejadian Pasal 1
                ambilIsiAlkitab('kejadian', 1);
            } catch (error) {
                alert('Gagal memuat daftar kitab. Periksa koneksi internet Anda.');
                console.error(error);
            }
        }

        // 2. Fungsi mengambil konten ayat berdasarkan kitab dan pasal
        async function ambilIsiAlkitab(kitabId, pasal) {
            // Tampilkan loading, sembunyikan konten lama
            loading.classList.remove('hidden');
            kontenAlkitab.classList.add('hidden');
            judulPasal.classList.add('hidden');
            kontenAlkitab.innerHTML = '';

            try {
                const response = await fetch(`${BASE_URL}/books/${kitabId}/${pasal}`);
                const data = await response.json();

                // Set Judul Halaman Bacaan
                judulPasal.textContent = `${data.name} - Pasal ${data.chapter}`;
                judulPasal.classList.remove('hidden');

                // Render setiap ayat ke dalam HTML
                data.verses.forEach(ayat => {
                    const p = document.createElement('p');
                    p.className = "leading-relaxed text-lg pb-2 border-b border-gray-100 last:border-none";
                    p.innerHTML = `<sup class="text-blue-600 font-bold mr-2">${ayat.verse}</sup> ${ayat.text}`;
                    kontenAlkitab.appendChild(p);
                });

                kontenAlkitab.classList.remove('hidden');
            } catch (error) {
                kontenAlkitab.innerHTML = `<p class="text-red-500 font-medium text-center">Pasal tidak ditemukan atau server bermasalah.</p>`;
                kontenAlkitab.classList.remove('hidden');
                console.error(error);
            } finally {
                loading.classList.add('hidden');
            }
        }

        // Event Listener untuk Tombol Cari/Buka
        btnCari.addEventListener('click', () => {
            const kitabTerpilih = selectKitab.value;
            const pasalTerpilih = inputPasal.value;
            if(pasalTerpilih > 0) {
                ambilIsiAlkitab(kitabTerpilih, pasalTerpilih);
            }
        });

        // Jalankan aplikasi pertama kali
        muatDaftarKitab();
    </script>
</body>
</html>
